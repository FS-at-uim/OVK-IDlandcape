<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OVK ID Landscape Map</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="16x16" href="https://www.ovk.de/wp-content/themes/bvdw/assets/img/favicon/favicon-16x16.png?v=.9">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="style.css?v=1.0.6">
</head>
<body>

  

  <!-- Main Application Wrapper -->
  <main class="app-container">
    
    <!-- Controls Panel -->
    <div class="controls-panel">
      <div class="filter-status">
        <span class="status-label">Aktive Filter:</span>
        <div class="active-chips" id="active-chips">
          <span class="no-filter-text">Keine Filter aktiv</span>
        </div>
      </div>
      <button id="btn-reset" class="btn-reset" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 7.89M9 11l3 3m0 0l3-3m-3 3V8" />
        </svg>
        Ansicht zurücksetzen
      </button>
    </div>

    <!-- Stage 1: Usecase Selector Panel (Horizontal) -->
    <div class="usecase-selector-panel" id="stage-usecase" data-stage="usecase">
      <div class="usecase-panel-header">
        <div class="stage-badge">1</div>
        <div class="usecase-header-text">
          <h2>Usecase</h2>
          <span class="stage-subtitle">Vorselektion</span>
        </div>
      </div>
      <div class="usecase-panel-cards" id="list-usecases">
        <!-- Dynamically filled -->
      </div>
    </div>

    <!-- Stage 1a: Data Partner Panel (Horizontal, conditionally visible) -->
    <div class="usecase-selector-panel stage-datapartner-panel" id="stage-datapartner" data-stage="datapartner" style="display: none; margin-top: 1.25rem;">
      <div class="usecase-panel-header">
        <div class="stage-badge">1a</div>
        <div class="usecase-header-text">
          <h2>Data Partner</h2>
          <span class="stage-subtitle">ID fähig</span>
        </div>
      </div>
      <div class="usecase-panel-cards" id="list-datapartner">
        <!-- Dynamically filled -->
      </div>
    </div>

    <!-- Landscape Grid (4 Columns, Publisher double width) -->
    <div class="landscape-grid">
      
      <!-- Stage 2: DSP -->
      <div class="stage-column" id="stage-dsp" data-stage="dsp">
        <div class="stage-header">
          <div class="stage-badge">2</div>
          <h2>DSP</h2>
          <span class="stage-subtitle">Demand Side</span>
        </div>
        <div class="cards-list" id="list-dsps">
          <!-- Dynamically filled -->
        </div>
      </div>

      <!-- Stage 3: SSP -->
      <div class="stage-column" id="stage-ssp" data-stage="ssp">
        <div class="stage-header">
          <div class="stage-badge">3</div>
          <h2>SSP</h2>
          <span class="stage-subtitle">Supply Side</span>
        </div>
        <div class="cards-list" id="list-ssps">
          <!-- Dynamically filled -->
        </div>
      </div>

      <!-- Stage 4: Vermarkter -->
      <div class="stage-column" id="stage-vermarkter" data-stage="vermarkter">
        <div class="stage-header">
          <div class="stage-badge">4</div>
          <h2>Vermarkter</h2>
          <span class="stage-subtitle">Sales Houses</span>
        </div>
        <div class="cards-list" id="list-vermarkters">
          <!-- Dynamically filled -->
        </div>
      </div>



    </div>

    <!-- Info Drawer for Selected Items -->
    <div class="detail-drawer" id="detail-drawer">
      <div class="drawer-header">
        <h3 id="drawer-title">Partner-Details</h3>
        <button class="btn-close-drawer" id="btn-close-drawer">&times;</button>
      </div>
      <div class="drawer-content" id="drawer-content">
        Wählen Sie einen Partner aus, um weitere Details anzuzeigen.
      </div>
    </div>

  </main>


  <script src="config/core.js?v=1.0.6"></script>
  <script src="app.js?v=1.0.6"></script>
</body>
</html>
